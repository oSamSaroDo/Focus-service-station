<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงานสรุป — ปั๊มน้ำมัน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2330;
  --border: #30363d;
  --accent: #f0a500;
  --accent2: #e05c2a;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --text: #e6edf3;
  --text-muted: #8b949e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Sarabun', sans-serif;
  font-size: 15px;
  min-height: 100vh;
}

/* ── SCREEN HEADER ── */
.screen-header {
  background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
  flex-wrap: wrap; gap: 12px;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 38px; height: 38px; background: var(--accent);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text { font-size: 16px; font-weight: 700; }
.logo-sub  { font-size: 11px; color: var(--text-muted); }

.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.btn {
  padding: 8px 18px; border-radius: 8px; border: none;
  cursor: pointer; font-family: 'Sarabun', sans-serif;
  font-size: 13px; font-weight: 600; transition: all 0.18s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: #0d1117; }
.btn-primary:hover { background: #fbb628; transform: translateY(-1px); }
.btn-ghost  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-pdf    { background: #e05c2a; color: #fff; }
.btn-pdf:hover { background: #f0692e; transform: translateY(-1px); }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.filter-bar label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.filter-bar select, .filter-bar input[type="date"] {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  padding: 6px 10px; cursor: pointer;
}
.filter-bar select:focus, .filter-bar input[type="date"]:focus {
  outline: none; border-color: var(--accent);
}
#status_bar {
  margin-left: auto; font-size: 12px; color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
}

/* ── MAIN ── */
main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

/* ── STAT CARDS ── */
.stat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px 20px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.stat-card.orange::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.stat-card.green::before  { background: linear-gradient(90deg, #3fb950, #2ea04f); }
.stat-card.blue::before   { background: linear-gradient(90deg, #58a6ff, #388bfd); }
.stat-card.red::before    { background: linear-gradient(90deg, #f85149, #da3633); }

.stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text); }
.stat-unit  { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
.stat-sub   { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* ── TABLE ── */
.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 28px; }

table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
thead th {
  background: var(--surface2); padding: 11px 14px;
  text-align: right; font-size: 11px; font-weight: 600;
  color: var(--text-muted); letter-spacing: 0.5px; white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
thead th:first-child { text-align: left; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody td {
  padding: 10px 14px; text-align: right;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px;
}
tbody td:first-child {
  text-align: left; font-family: 'Sarabun', sans-serif;
  font-size: 13px; font-weight: 600; color: var(--accent);
  white-space: nowrap;
}
tbody td.positive { color: var(--green); }
tbody td.negative { color: var(--red); }
tbody td.neutral  { color: var(--text-muted); }

tfoot td {
  padding: 12px 14px; text-align: right;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700;
  background: var(--surface2); color: var(--accent);
  border-top: 2px solid var(--accent);
}
tfoot td:first-child { text-align: left; font-family: 'Sarabun', sans-serif; font-size: 14px; }

/* diff badge */
.diff-ok  { color: var(--green); }
.diff-bad { color: var(--red); }

/* ── LOADING / EMPTY ── */
#loading, #empty {
  text-align: center; padding: 60px 24px;
  color: var(--text-muted); font-size: 15px;
}
#loading .spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PRINT STYLES ── */
@media print {
  body { background: #fff; color: #111; font-size: 11pt; }
  .screen-header, .filter-bar, .no-print { display: none !important; }
  main { max-width: none; padding: 0; }
  .print-header { display: block !important; }
  .stat-card { background: #f8f9fa; border: 1px solid #dee2e6; page-break-inside: avoid; }
  .stat-card::before { display: none; }
  .stat-label { color: #6c757d; }
  .stat-value { color: #111; font-size: 16pt; }
  .stat-sub { color: #6c757d; }
  table { font-size: 9pt; }
  thead th { background: #f1f3f5; color: #495057; border-bottom: 2px solid #dee2e6; }
  tbody tr:hover { background: none; }
  tfoot td { background: #fff3cd; color: #856404; border-top: 2px solid #f0a500; }
  .table-wrap { border: 1px solid #dee2e6; border-radius: 0; }
  .stat-grid { grid-template-columns: repeat(4,1fr); gap: 8px; }
  .diff-ok  { color: #198754; }
  .diff-bad { color: #dc3545; }
  @page { margin: 12mm 14mm; size: A4 landscape; }
}

/* ── PRINT HEADER (hidden on screen) ── */
.print-header {
  display: none;
  text-align: center; margin-bottom: 20px;
  border-bottom: 2px solid #f0a500; padding-bottom: 10px;
}
.print-header h1 { font-size: 18pt; font-weight: 700; }
.print-header p  { font-size: 10pt; color: #6c757d; margin-top: 4px; }

/* ── MONTH SECTION BREAK ── */
.month-section { margin-bottom: 36px; }
.month-title {
  font-size: 13px; font-weight: 700; color: var(--accent);
  background: rgba(240,165,0,0.08); border: 1px solid rgba(240,165,0,0.3);
  border-radius: 6px; padding: 5px 14px; display: inline-block; margin-bottom: 12px;
}


@media (max-width: 800px) {
  .stat-grid { grid-template-columns: repeat(2,1fr); }
  .screen-header { padding: 14px 16px; }
  main { padding: 20px 12px; }
  .filter-bar { padding: 12px 16px; }
}
</style>
</head>
<body>

<!-- ── SCREEN HEADER ── -->
<header class="screen-header no-print">
  <div class="logo">
    <div class="logo-icon">⛽</div>
    <div>
      <div class="logo-text">รายงานสรุป</div>
      <div class="logo-sub">ปั๊มน้ำมัน — Gas Station Report</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="window.location.href='index.html'">← กลับหน้าหลัก</button>
    <button class="btn btn-ghost" onclick="window.location.href='tank.html'" style="border-color:#58a6ff;color:#58a6ff;">🛢 แทงค์น้ำมัน</button>
    <button class="btn btn-ghost" onclick="reloadFirebase()" id="btn_reload">🔄 โหลดใหม่</button>
    <button class="btn btn-pdf no-print" onclick="printReport()">⬇ ดาวน์โหลด PDF</button>
  </div>
</header>

<!-- ── FILTER BAR ── -->
<div class="filter-bar no-print" id="filter_bar" style="display:none;">
  <label>กรอง:</label>
  <select id="filter_month" onchange="render()">
    <option value="">ทุกเดือน</option>
  </select>
  <label>ตั้งแต่</label>
  <input type="date" id="filter_from" onchange="render()">
  <label>ถึง</label>
  <input type="date" id="filter_to" onchange="render()">
  <button class="btn btn-ghost" style="padding:6px 12px; font-size:12px;" onclick="clearFilters()">✕ ล้างตัวกรอง</button>
  <span id="status_bar">—</span>
</div>

<!-- ── PRINT HEADER ── -->
<div class="print-header">
  <h1>รายงานสรุปประจำวัน — ปั๊มน้ำมัน</h1>
  <p id="print_subtitle">พิมพ์เมื่อ: —</p>
</div>

<!-- ── MAIN CONTENT ── -->
<main id="main_content">
  <div id="loading">
    <div class="spinner"></div>
    กำลังโหลดข้อมูล...
  </div>
  <div id="empty" style="display:none;">
    ไม่พบข้อมูลในช่วงที่เลือก
  </div>
  <div id="report_body" style="display:none;"></div>

  <!-- ── FIREBASE ERROR (fallback) ── -->
  <div id="setup_card" style="display:none;">
    <div style="background:var(--surface);border:1px solid var(--red);border-radius:12px;padding:28px;max-width:460px;margin:60px auto;text-align:center;">
      <div style="font-size:32px;margin-bottom:14px;">🔥</div>
      <h2 style="font-size:18px;margin-bottom:10px;">ไม่สามารถเชื่อมต่อ Firebase</h2>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;" id="setup_error"></p>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="reloadFirebase()">🔄 ลองใหม่</button>
    </div>
  </div>
</main>

<script>
// ── Constants ──────────────────────────────────────────────
const MONTHS_TH = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

var sheetData = {};

// ── Helpers ────────────────────────────────────────────────
function fmt(n, dec = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('th-TH', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function parseKey(k) {
  const p = k.split('-');
  // รองรับ key "d-m-yy-m"/"d-m-yy-e" (มี shift) และ key เก่า "d-m-yy"
  return {
    day:   parseInt(p[0]),
    month: parseInt(p[1]),
    year2: parseInt(p[2]),
    shift: p[3] || ''   // 'm' = กะเช้า, 'e' = กะเย็น, '' = legacy
  };
}

// Convert "d-m-yy[-shift]" → Date object (local midnight) for date-range comparison
function keyToDate(k) {
  const p = parseKey(k);
  // year2 เป็น 2 หลักท้ายของ พ.ศ. เช่น 69 = พ.ศ. 2569 = ค.ศ. 2026
  const yearCE = (p.year2 < 100 ? 2500 + p.year2 : p.year2) - 543;
  // ใช้ local midnight (ไม่ใช่ UTC) ป้องกัน timezone offset bug ตอน filter
  return new Date(yearCE, p.month - 1, p.day);
}

function fmtKey(k) {
  const p = parseKey(k);
  const shiftIcon = p.shift === 'm' ? ' ☀️' : p.shift === 'e' ? ' 🌙' : '';
  return `${String(p.day).padStart(2,'0')} ${MONTHS_TH[p.month]} 25${String(p.year2).padStart(2,'0')}${shiftIcon}`;
}

function monthGroupKey(k) {
  const p = parseKey(k);
  return `${p.month}-${p.year2}`;
}

function monthLabel(mgKey) {
  const [m, y] = mgKey.split('-').map(Number);
  return `${MONTHS_TH[m]} 25${String(y).padStart(2,'0')}`;
}

// ── Compute one day's numbers ─────────────────────────────
function computeDay(d) {
  const disc   = d.disc   ?? 0.5;
  const change = d.change ?? 3700;

  // G95
  const g95n_l = Math.max(0, (d.g95n_close || 0) - (d.g95n_open || 0));
  const g95l_l = Math.max(0, (d.g95l_close || 0) - (d.g95l_open || 0));
  const g95_l  = g95n_l + g95l_l;
  const g95_sale = g95_l * (d.g95_price || 0);

  // G91
  const g91n_l = Math.max(0, (d.g91n_close || 0) - (d.g91n_open || 0));
  const g91l_l = Math.max(0, (d.g91l_close || 0) - (d.g91l_open || 0));
  const g91_l  = g91n_l + g91l_l;
  const g91_sale = g91_l * (d.g91_price || 0);

  // Diesel ตู้ 3
  const dn_l  = Math.max(0, (d.dn_close || 0) - (d.dn_open || 0));
  const dl_l  = Math.max(0, (d.dl_close || 0) - (d.dl_open || 0));
  const d3_l  = dn_l + dl_l;
  const dp    = d.d_price || 0;
  const d3_sale = d3_l * dp;

  // Diesel ตู้ 4
  const d4n_l = Math.max(0, (d.d4n_close || 0) - (d.d4n_open || 0));
  const d4l_l = Math.max(0, (d.d4l_close || 0) - (d.d4l_open || 0));
  const d4_l  = d4n_l + d4l_l;
  const d4p   = d.d4_price || dp;
  const d4_sale = d4_l * d4p;

  // Promotion — air_disc_custom: ตรวจสอบด้วย !== undefined && !== '' (ไม่ใช่ || เพราะ 0 เป็น valid)
  const air_l    = d.air_liter || 0;
  const air_p    = d.air_price_custom || dp;
  const _airDisc = d.air_disc_custom;
  const air_d    = (_airDisc !== undefined && _airDisc !== '' && _airDisc !== null)
                    ? parseFloat(_airDisc) || 0
                    : disc;
  const air_net  = air_l * (air_p - air_d);

  const totalFuelFull = g95_sale + g91_sale + d3_sale + d4_sale;
  const totalLiter    = g95_l + g91_l + d3_l + d4_l;

  // Cash & transfer
  const cashTotal = computeCash(d) + computeTransfer(d);
  const mustSend  = cashTotal - change;
  const diff      = mustSend - totalFuelFull;

  // tank_in fields — index.html บันทึกเป็น "tank_in_g95" (ไม่ใช่ "in_g95")
  const in_g95 = d.tank_in_g95 || d.in_g95 || 0;
  const in_g91 = d.tank_in_g91 || d.in_g91 || 0;
  const in_d   = d.tank_in_d   || d.in_d   || 0;

  return {
    g95_l, g95_sale,
    g91_l, g91_sale,
    d3_l, d3_sale,
    d4_l, d4_sale,
    air_l, air_net,
    totalFuelFull, totalLiter,
    cashTotal, mustSend, diff,
    change, disc,
    in_g95, in_g91, in_d
  };
}

function computeCash(d) {
  if (!d.cash) return 0;
  // ต้องตรงกับ DENOMS ใน index.html: 1000,500,100,50,20,10,5,2,1
  const denoms = [1000, 500, 100, 50, 20, 10, 5, 2, 1];
  return denoms.reduce((s, v) => {
    const qty = d.cash[String(v)] ?? d.cash[v] ?? 0;
    return s + qty * v;
  }, 0);
}

function computeTransfer(d) {
  if (!d.transfer) return 0;
  return d.transfer.reduce((s, r) => s + (r.amount || 0), 0);
}

// ── Filter helpers ────────────────────────────────────────
function getFilteredKeys() {
  const month = document.getElementById('filter_month')?.value || '';
  const from  = document.getElementById('filter_from')?.value;   // yyyy-mm-dd
  const to    = document.getElementById('filter_to')?.value;

  return Object.keys(sheetData).filter(k => {
    if (month) {
      if (monthGroupKey(k) !== month) return false;
    }
    if (from || to) {
      const d = keyToDate(k);  // local midnight
      if (from) {
        // new Date("yyyy-mm-dd") = UTC midnight → แปลงเป็น local midnight
        const [fy, fm, fd] = from.split('-').map(Number);
        if (d < new Date(fy, fm - 1, fd)) return false;
      }
      if (to) {
        const [ty, tm, td] = to.split('-').map(Number);
        if (d > new Date(ty, tm - 1, td)) return false;
      }
    }
    return true;
  });
}

function clearFilters() {
  document.getElementById('filter_month').value = '';
  document.getElementById('filter_from').value  = '';
  document.getElementById('filter_to').value    = '';
  render();
}

// ── Populate month filter ─────────────────────────────────
function populateMonthFilter() {
  const sel = document.getElementById('filter_month');
  const groups = [...new Set(Object.keys(sheetData).map(monthGroupKey))].sort((a, b) => {
    const [am, ay] = a.split('-').map(Number);
    const [bm, by] = b.split('-').map(Number);
    if (ay !== by) return ay - by;
    return am - bm;
  });
  sel.innerHTML = '<option value="">ทุกเดือน</option>';
  groups.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = monthLabel(g);
    sel.appendChild(opt);
  });
}

// ── Render ────────────────────────────────────────────────
function render() {
  const keys = getFilteredKeys();
  const body = document.getElementById('report_body');
  const empty = document.getElementById('empty');

  // นับวันจริง (unique d-m-y ไม่นับ shift ซ้ำ)
  const uniqueDays = new Set(keys.map(k => {
    const p = parseKey(k); return `${p.day}-${p.month}-${p.year2}`;
  })).size;

  document.getElementById('status_bar').textContent =
    `แสดง ${uniqueDays} วัน (${keys.length} กะ) จาก ${Object.keys(sheetData).length} records`;

  if (keys.length === 0) {
    body.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  body.style.display  = 'block';

  // เรียงวันจากน้อยไปมาก (รองรับ shift key)
  keys.sort((a, b) => {
    const pa = parseKey(a), pb = parseKey(b);
    if (pa.year2 !== pb.year2) return pa.year2 - pb.year2;
    if (pa.month !== pb.month) return pa.month - pb.month;
    if (pa.day   !== pb.day)   return pa.day   - pb.day;
    // กะเช้า (m) ก่อน กะเย็น (e)
    const so = { 'm': 0, 'e': 1, '': 0 };
    return (so[pa.shift]||0) - (so[pb.shift]||0);
  });

  // Compute totals across filtered days
  let totG95sale=0, totG91sale=0, totD3sale=0, totD4sale=0;
  let totG95l=0, totG91l=0, totD3l=0, totD4l=0;
  let totFull=0, totSend=0, totDiff=0;
  let daysOver=0, daysShort=0, daysExact=0;

  keys.forEach(k => {
    const c = computeDay(sheetData[k]);
    totG95sale += c.g95_sale; totG91sale += c.g91_sale;
    totD3sale  += c.d3_sale;  totD4sale  += c.d4_sale;
    totG95l += c.g95_l; totG91l += c.g91_l;
    totD3l  += c.d3_l;  totD4l  += c.d4_l;
    totFull += c.totalFuelFull; totSend += c.mustSend; totDiff += c.diff;
    if (Math.abs(c.diff) < 0.01) daysExact++;
    else if (c.diff >= 0) daysOver++;
    else daysShort++;
  });
  const totLiter = totG95l + totG91l + totD3l + totD4l;

  // ── Build HTML ──
  let html = '';

  // ── Stat Cards ──
  html += `
  <div class="stat-grid">
    <div class="stat-card orange">
      <div class="stat-label">รวมยอดน้ำมัน</div>
      <div class="stat-value">${fmt(totFull)}<span class="stat-unit">฿</span></div>
      <div class="stat-sub">${fmt(totLiter)} ลิตร รวม</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">ยอดส่งรวม (หักทอน)</div>
      <div class="stat-value">${fmt(totSend)}<span class="stat-unit">฿</span></div>
      <div class="stat-sub">${uniqueDays} วันทำการ (${keys.length} กะ)</div>
    </div>
    <div class="stat-card ${totDiff >= 0 ? 'green' : 'red'}">
      <div class="stat-label">ผลต่างรวม</div>
      <div class="stat-value">${fmt(Math.abs(totDiff))}<span class="stat-unit">฿</span></div>
      <div class="stat-sub">${totDiff >= 0 ? '▲ เกินรวม' : '▼ ขาดรวม'}</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">วันที่ยอดตรง / เกิน / ขาด</div>
      <div class="stat-value" style="font-size:17px;">
        <span style="color:var(--green)">${daysExact}</span>
        <span style="font-size:13px; color:var(--text-muted)"> / </span>
        <span style="color:var(--blue)">${daysOver}</span>
        <span style="font-size:13px; color:var(--text-muted)"> / </span>
        <span style="color:var(--red)">${daysShort}</span>
      </div>
      <div class="stat-sub">ตรง / เกิน / ขาด</div>
    </div>
  </div>`;

  // ── Per-fuel summary bar ──
  html += `
  <div class="section-label">สรุปแยกตาม ประเภทน้ำมัน</div>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:28px;">
    ${[
      {label:'ตู้ 1 · G95', sale:totG95sale, liter:totG95l, color:'#f85149'},
      {label:'ตู้ 2 · G91', sale:totG91sale, liter:totG91l, color:'#3fb950'},
      {label:'ตู้ 3+4 · Diesel', sale:totD3sale+totD4sale, liter:totD3l+totD4l, color:'#58a6ff'},
    ].map(f => `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${f.color};margin-bottom:8px;">${f.label}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;">${fmt(f.sale)} <span style="font-size:11px;color:var(--text-muted)">฿</span></div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:3px;">${fmt(f.liter)} ลิตร</div>
      </div>`).join('')}
  </div>`;

  // ── Daily Table by month group ──
  const groupMap = {};
  keys.forEach(k => {
    const g = monthGroupKey(k);
    if (!groupMap[g]) groupMap[g] = [];
    groupMap[g].push(k);
  });

  // เรียง month group จากน้อยไปมาก
  const sortedGroupEntries = Object.entries(groupMap).sort(([a], [b]) => {
    const [am, ay] = a.split('-').map(Number);
    const [bm, by] = b.split('-').map(Number);
    if (ay !== by) return ay - by;
    return am - bm;
  });

  html += `<div class="section-label">รายละเอียดรายวัน</div>`;

  sortedGroupEntries.forEach(([gk, dayKeys]) => {
    let mG95=0,mG91=0,mD3=0,mD4=0,mFull=0,mSend=0,mDiff=0;

    const rows = dayKeys.map(k => {
      const c = computeDay(sheetData[k]);
      mG95+=c.g95_sale; mG91+=c.g91_sale; mD3+=c.d3_sale; mD4+=c.d4_sale;
      mFull+=c.totalFuelFull; mSend+=c.mustSend; mDiff+=c.diff;
      const diffClass = Math.abs(c.diff)<0.01 ? 'neutral' : c.diff>=0 ? 'positive' : 'negative';
      const diffTxt   = Math.abs(c.diff)<0.01 ? 'ตรง' : (c.diff>0?'+':'-') + fmt(Math.abs(c.diff));
      return `<tr>
        <td>${fmtKey(k)}</td>
        <td>${fmt(c.g95_sale)}</td>
        <td style="color:var(--text-muted)">${fmt(c.g95_l,2)}</td>
        <td>${fmt(c.g91_sale)}</td>
        <td style="color:var(--text-muted)">${fmt(c.g91_l,2)}</td>
        <td>${fmt(c.d3_sale + c.d4_sale)}</td>
        <td style="color:var(--text-muted)">${fmt(c.d3_l + c.d4_l,2)}</td>
        <td>${fmt(c.totalFuelFull)}</td>
        <td>${fmt(c.totalLiter,2)}</td>
        <td>${fmt(c.mustSend)}</td>
        <td class="${diffClass}">${diffTxt}</td>
      </tr>`;
    }).join('');

    const mDiffClass = Math.abs(mDiff)<0.01 ? '' : mDiff>=0 ? 'positive' : 'negative';
    const mDiffTxt   = Math.abs(mDiff)<0.01 ? 'ตรง' : (mDiff>0?'+':'-') + fmt(Math.abs(mDiff));

    html += `
    <div class="month-section">
      <div class="month-title">${monthLabel(gk)}</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>วันที่</th>
              <th>G95 (฿)</th><th>ลิตร</th>
              <th>G91 (฿)</th><th>ลิตร</th>
              <th>D ตู้3+4 (฿)</th><th>ลิตร</th>
              <th>รวมน้ำมัน (฿)</th><th>รวมลิตร</th>
              <th>ยอดส่ง (฿)</th>
              <th>ผลต่าง</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr>
              <td>รวม ${monthLabel(gk)}</td>
              <td>${fmt(mG95)}</td><td></td>
              <td>${fmt(mG91)}</td><td></td>
              <td>${fmt(mD3+mD4)}</td><td></td>
              <td>${fmt(mFull)}</td><td></td>
              <td>${fmt(mSend)}</td>
              <td class="${mDiffClass}">${mDiffTxt}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>`;
  });

  // ── Grand total footer ──
  if (Object.keys(groupMap).length > 1) {
    const grandDiffClass = Math.abs(totDiff)<0.01 ? '' : totDiff>=0 ? 'diff-ok' : 'diff-bad';
    const grandDiffTxt   = Math.abs(totDiff)<0.01 ? 'ยอดตรง ✓' : (totDiff>0?'+':'-') + fmt(Math.abs(totDiff)) + ' ฿';
    html += `
    <div style="background:var(--surface2);border:1px solid var(--accent);border-radius:12px;padding:20px 24px;display:flex;flex-wrap:wrap;gap:24px;align-items:center;margin-bottom:28px;">
      <div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">ยอดรวมทั้งหมด</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;color:var(--accent)">${fmt(totFull)} ฿</div>
        <div style="font-size:12px;color:var(--text-muted);">${fmt(totLiter)} ลิตร · ${uniqueDays} วัน (${keys.length} กะ)</div>
      </div>
      <div style="width:1px;height:50px;background:var(--border);"></div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">ยอดส่งรวม</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;">${fmt(totSend)} ฿</div>
      </div>
      <div style="width:1px;height:50px;background:var(--border);"></div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">ผลต่างรวม</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;" class="${grandDiffClass}">${grandDiffTxt}</div>
      </div>
    </div>`;
  }

  body.innerHTML = html;

  // update print subtitle
  document.getElementById('print_subtitle').textContent =
    `พิมพ์เมื่อ: ${new Date().toLocaleString('th-TH')} · แสดง ${keys.length} กะ`;
}

function printReport() {
  const keys = getFilteredKeys();
  document.getElementById('print_subtitle').textContent =
    `พิมพ์เมื่อ: ${new Date().toLocaleString('th-TH')} · แสดง ${keys.length} กะ`;
  window.print();
}
</script>

<script type="module">
// ── Firebase ───────────────────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAZOWoDHEiGIxkYIRgRkNWXjNWGLE4wgFQ",
  authDomain: "gas-station-dd6e9.firebaseapp.com",
  projectId: "gas-station-dd6e9",
  storageBucket: "gas-station-dd6e9.firebasestorage.app",
  messagingSenderId: "94552958790",
  appId: "1:94552958790:web:12b94d4d4d7a1ac6e4a747"
};

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);
let _unsub = null;

function mergeData(loaded) {
  // mutate object เดิม ไม่ reassign ให้ regular script เห็นข้อมูลใหม่เสมอ
  Object.keys(sheetData).forEach(k => delete sheetData[k]);
  Object.assign(sheetData, loaded);
}

async function loadFromFirebase() {
  const docRef = doc(db, 'gas_station', 'daily_records');
  const snap = await getDoc(docRef);
  if (!snap.exists()) return {};
  return snap.data().records || {};
}

function startRealtimeSync() {
  if (_unsub) _unsub();
  const docRef = doc(db, 'gas_station', 'daily_records');
  _unsub = onSnapshot(docRef, (snap) => {
    if (!snap.exists()) return;
    mergeData(snap.data().records || {});
    if (typeof populateMonthFilter === 'function') populateMonthFilter();
    if (typeof render === 'function') render();
    document.getElementById('status_bar').textContent =
      `🟢 Real-time · ${Object.keys(sheetData).length} วัน`;
  });
}

window.reloadFirebase = async function() {
  const btn = document.getElementById('btn_reload');
  btn.textContent = '⏳...';
  btn.disabled = true;
  try {
    mergeData(await loadFromFirebase());
    if (typeof populateMonthFilter === 'function') populateMonthFilter();
    if (typeof render === 'function') render();
    document.getElementById('loading').style.display   = 'none';
    document.getElementById('filter_bar').style.display = 'flex';
    document.getElementById('report_body').style.display = 'block';
    document.getElementById('setup_card').style.display = 'none';
    btn.textContent = '✅ โหลดแล้ว';
    setTimeout(() => { btn.textContent = '🔄 โหลดใหม่'; btn.disabled = false; }, 1500);
  } catch(e) {
    btn.textContent = '❌ ล้มเหลว';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '🔄 โหลดใหม่'; }, 2000);
  }
};

async function initLoad() {
  try {
    mergeData(await loadFromFirebase());
    document.getElementById('loading').style.display   = 'none';
    document.getElementById('filter_bar').style.display = 'flex';
    document.getElementById('report_body').style.display = 'block';
    if (typeof populateMonthFilter === 'function') populateMonthFilter();
    if (typeof render === 'function') render();
    startRealtimeSync();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('setup_card').style.display = 'block';
    document.getElementById('setup_error').textContent = '❌ ' + e.message;
  }
}

initLoad();
</script>
